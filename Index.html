<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Smart Home Dashboard</title>
<style>
body {
  margin:0;
  font-family: Arial, sans-serif;
  background:#111;
  color:white;
  display:flex;
  flex-direction:column;
  align-items:center;
}

.clock {
  font-size:80px;
  margin-top:40px;
}

.section {
  width:90%;
  margin-top:40px;
}

.section h2 {
  border-bottom:1px solid #333;
  padding-bottom:10px;
}

.button-grid {
  display:grid;
  grid-template-columns:repeat(2, 1fr);
  gap:15px;
  margin-top:20px;
}

.button {
  background:#222;
  padding:25px;
  border-radius:15px;
  text-align:center;
  font-size:20px;
}

.button:active {
  background:#444;
}
</style>
</head>

<body>

<div class="clock" id="clock"></div>

<div class="section">
  <h2>Lights</h2>
  <div class="button-grid">
    <div class="button">Living Room</div>
    <div class="button">Kitchen</div>
    <div class="button">Bedroom</div>
    <div class="button">All Off</div>
  </div>
</div>

<div class="section">
  <h2>Scenes</h2>
  <div class="button-grid">
    <div class="button">Movie Mode</div>
    <div class="button">Good Night</div>
    <div class="button">Morning</div>
    <div class="button">Away</div>
  </div>
</div>

<script>
function updateClock() {
  const now = new Date();
  const hours = now.getHours().toString().padStart(2, '0');
  const minutes = now.getMinutes().toString().padStart(2, '0');
  document.getElementById('clock').innerHTML = hours + ":" + minutes;
}
setInterval(updateClock, 1000);
updateClock();
</script>

</body>
</html>
